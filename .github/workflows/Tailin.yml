name: RDP-Tailscale
on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Enable RDP
        run: |
          net user runner P@ssw0rd!2026 /add
          net localgroup administrators runner /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled successfully"

      - name: Install Tailscale
        run: |
          choco install tailscale -y
          Start-Service Tailscale
          Start-Sleep 5

      - name: Connect to Tailscale
        run: |
          tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=gh-runner --accept-routes
          Start-Sleep 10
          Write-Host "Tailscale IP:"
          tailscale ip -4

      - name: Keep Alive
        run: |
          Write-Host "Connected! Use the IP above"
          Write-Host "RDP Login: runner / P@ssw0rd!2026"
          Start-Sleep 21600
