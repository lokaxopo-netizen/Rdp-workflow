name: RDP-Tailscale
on: workflow_dispatch
jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runner 1234
          net localgroup administrators runner /add

      - name: Install and Connect Tailscale
        run: |
          choco install tailscale -y
          Start-Service Tailscale
          Start-Sleep 5
          tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=gh-runner
          Start-Sleep 10
          Write-Host "Tailscale IP:"
          tailscale ip -4

      - name: Keep alive
        run: Start-Sleep 21600
